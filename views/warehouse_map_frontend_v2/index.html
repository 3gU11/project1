<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>库位大屏</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#f5f8fc;font-family:Inter,-apple-system,BlinkMacSystemFont,sans-serif;color:#1e2f3e;overflow:hidden}
.page{padding:1rem;height:100%;display:flex;flex-direction:column;min-height:0}
.toolbar{background:#fff;border:1px solid #e2edf2;border-radius:1rem;padding:.75rem 1rem;display:flex;flex-wrap:wrap;gap:.6rem;align-items:center;justify-content:space-between;margin-bottom:1rem}
.group{display:flex;flex-wrap:wrap;gap:.45rem;align-items:center}
.btn{border:none;background:#f1f5f9;color:#3b6e8f;padding:.35rem .85rem;border-radius:999px;font-size:.74rem;cursor:pointer}
.btn.active{background:#2c7da0;color:#fff}
.search{display:flex;align-items:center;gap:.4rem;background:#f1f5f9;border-radius:999px;padding:.2rem .65rem}
.search i{font-size:.75rem;color:#8aa9c9}
.search input{border:none;outline:none;background:transparent;width:130px;font-size:.78rem}
.stats{font-size:.7rem;background:#eef2ff;color:#2c7da0;border-radius:999px;padding:.2rem .75rem}
.area-switch{display:flex;align-items:center;gap:.35rem;background:#f1f5f9;border-radius:999px;padding:.2rem .55rem}
.area-switch label{font-size:.72rem;color:#51738f;font-weight:600}
.area-switch select{border:none;outline:none;background:transparent;font-size:.74rem;color:#1a3a55;min-width:74px}
.grid-wrap{overflow:auto;padding-bottom:.2rem;flex:1;min-height:0}
.grid{display:grid;gap:.9rem}
.grid.auto{grid-template-columns:repeat(auto-fill,minmax(160px,1fr))}
.grid.matrix{grid-auto-flow:row;grid-auto-rows:minmax(150px,auto)}
@media(max-width:600px){.grid.auto{grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:.7rem}}
@media(max-width:768px){
  .toolbar{position:sticky;top:0;z-index:20;padding:.6rem .7rem;gap:.45rem;border-radius:.8rem}
  .search input{width:96px}
  .grid.matrix,.grid.auto{grid-template-columns:repeat(2,minmax(0,1fr)) !important;min-width:0 !important}
  .card{min-width:0}
}
.card{background:#fff;border:1.5px solid #e9eff5;border-radius:1rem;padding:.85rem .55rem;display:flex;flex-direction:column;align-items:center;gap:.3rem;cursor:pointer;transition:.12s;box-shadow:0 1px 3px rgba(0,0,0,.04);min-width:140px}
.card:hover{transform:translateY(-3px);box-shadow:0 6px 14px rgba(0,0,0,.08)}
.card.hit{outline:2px solid #2c7da0;box-shadow:0 0 0 4px rgba(44,125,160,.18)}
.code{font-size:.9rem;font-weight:700;background:#eef2fa;padding:.15rem .7rem;border-radius:999px;color:#1a3a55}
.tag{font-size:.66rem;font-weight:600;border-radius:999px;padding:.16rem .55rem}
.count{font-size:.66rem;color:#7a9ab8}
.card.s-empty{border-color:#c2e0cc}.card.s-occ{border-color:#a8c8e8}.card.s-full{border-color:#f5b8b8;background:#fff8f8}.card.s-lock{border-color:#c8c8cc;background:#f7f7f8}
.s-empty .tag{background:#e0f2e9;color:#1f7840}.s-occ .tag{background:#ddeeff;color:#1a5fa8}.s-full .tag{background:#ffe0e0;color:#b13030}.s-lock .tag{background:#ebebed;color:#6e6e73}
.sn{width:100%;display:flex;flex-direction:column;gap:.25rem}
.sn div{background:#f0f6ff;color:#2060a0;font-size:.63rem;font-weight:600;border-radius:.45rem;padding:.2rem .45rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:center}
.sn-more{font-size:.6rem;color:#9ab8cc;text-align:center}
.empty{font-size:.64rem;color:#9ab8cc}
.no{grid-column:1/-1;background:#fff;border-radius:1rem;text-align:center;padding:2rem 1rem;color:#8aa9c9}
.area-section{margin-bottom:1.1rem}
.area-divider{display:flex;align-items:center;gap:.6rem;color:#5a7d9a;font-size:.78rem;font-weight:700;margin:.2rem 0 .6rem}
.area-divider::before,.area-divider::after{content:"";flex:1;height:1px;background:linear-gradient(to right,transparent,#b9d0e1,transparent)}
.toast{position:fixed;left:50%;transform:translateX(-50%);bottom:20px;background:rgba(20,35,50,.85);color:#fff;padding:7px 16px;border-radius:999px;font-size:.74rem;opacity:0;transition:.2s;pointer-events:none;max-width:90vw;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;z-index:999}
body.high-contrast{background:#0d1117}
body.high-contrast .toolbar{background:#161b22;border-color:#30363d}
body.high-contrast .btn{background:#21262d;color:#8b949e}
body.high-contrast .btn.active{background:#1f6feb;color:#fff}
body.high-contrast .search{background:#21262d} body.high-contrast .search input{color:#c9d1d9}
body.high-contrast .stats{background:#1f2937;color:#58a6ff}
body.high-contrast .card{background:#161b22;border-color:#30363d;color:#c9d1d9}
body.high-contrast .code{background:#21262d;color:#e6edf3}
</style>
</head>
<body>
<div class="page">
  <div class="toolbar">
    <div class="group">
      <button class="btn active" data-filter="all">全部</button>
      <button class="btn" data-filter="s-empty">空闲</button>
      <button class="btn" data-filter="s-occ">占用</button>
      <button class="btn" data-filter="s-full">满载</button>
      <button class="btn" data-filter="s-lock">锁定/异常</button>
    </div>
    <div class="search"><i class="fas fa-search"></i><input id="q" placeholder="库位编号 / 流水号"></div>
    <div class="area-switch"><label for="areaSel">区域</label><select id="areaSel"><option value="all">全部</option></select></div>
    <div class="stats" id="stats">加载中...</div>
  </div>

  <div class="grid-wrap">
    <div id="grid" class="grid auto"></div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
function sendMessageToStreamlit(type, data) {
  window.parent.postMessage(Object.assign({
    isStreamlitMessage: true,
    type: type
  }, data || {}), '*');
}

function setVal(v){
  sendMessageToStreamlit('streamlit:setComponentValue',{value:`${v}||${Date.now()}`});
}
function setH(h){sendMessageToStreamlit('streamlit:setFrameHeight',{height:h})}

function calcFrameHeight(){
  const vh = window.innerHeight || 900;
  const content = (document.querySelector('.page')?.offsetHeight || vh);
  return Math.min(Math.max(content, 700), vh);
}

let inited=false,allSlots=[],filter='all',query='',areaFilter='all';
const txt={"s-empty":"空闲","s-occ":"占用","s-full":"满载","s-lock":"锁定/异常"};

function normStatus(s){
  const st=String(s.status||'').trim();
  const c=Number(s.count||0);
  const m=Number(s.max_capacity||0);
  if(st==='锁定'||st==='异常'||st==='锁定异常') return 's-lock';
  if(m>0&&c>=m) return 's-full';
  if(c>0) return 's-occ';
  return 's-empty';
}

function showToast(msg){
  const t=document.getElementById('toast');
  clearTimeout(window.__toastTimer);
  t.innerText=msg;
  t.style.opacity='1';
  window.__toastTimer=setTimeout(()=>t.style.opacity='0',1600);
}

function cluster(values,tolerance=12){
  const out=[];
  values.sort((a,b)=>a-b).forEach(v=>{
    const last=out[out.length-1];
    if(last===undefined||Math.abs(v-last)>tolerance) out.push(v);
  });
  return out;
}

function nearestIndex(list,v){
  let idx=0,best=Infinity;
  for(let i=0;i<list.length;i++){
    const d=Math.abs(list[i]-v);
    if(d<best){best=d;idx=i;}
  }
  return idx;
}

function buildMatrixMeta(list){
  const hasCoord=list.some(x=>Number.isFinite(x.x)&&Number.isFinite(x.y));
  if(!hasCoord) return null;

  const xs=cluster(list.map(x=>Number(x.x||0)));
  const ys=cluster(list.map(x=>Number(x.y||0)));
  if(xs.length===0||ys.length===0) return null;

  list.forEach(s=>{
    s.col=nearestIndex(xs,Number(s.x||0))+1;
    s.row=nearestIndex(ys,Number(s.y||0))+1;
  });

  return {cols:xs.length,rows:ys.length};
}

function populateAreaSelect(){
  const sel = document.getElementById('areaSel');
  if(!sel) return;
  const current = areaFilter;
  const areas = Array.from(new Set(allSlots.map(s=>s.area||'未分区'))).sort();
  sel.innerHTML = '<option value="all">全部</option>' + areas.map(a=>`<option value="${a}">${a}区</option>`).join('');
  if(Array.from(sel.options).some(o=>o.value===current)){
    sel.value = current;
  }else{
    areaFilter = 'all';
    sel.value = 'all';
  }
}

function render(){
  const grid=document.getElementById('grid');
  const stats=document.getElementById('stats');

  const list=allSlots.filter(x=>{
    if(filter!=='all'&&x.ui!==filter) return false;
    if(areaFilter!=='all' && x.area!==areaFilter) return false;
    if(query&& !x.search.includes(query.toLowerCase())) return false;
    return true;
  });

  stats.innerHTML=`<i class="fas fa-cubes"></i> 显示 ${list.length} / ${allSlots.length} 个库位`;

  if(!list.length){
    grid.className='grid auto';
    grid.innerHTML='<div class="no"><i class="fas fa-search"></i> 没有找到匹配的库位</div>';
    setH(calcFrameHeight());
    return;
  }

  const matrix=buildMatrixMeta(list);
  if(matrix){
    grid.className='grid matrix';
    grid.style.gridTemplateColumns=`repeat(${matrix.cols}, minmax(150px, 1fr))`;
    grid.style.minWidth=`${Math.max(760,matrix.cols*168)}px`;
  }else{
    grid.className='grid auto';
    grid.style.gridTemplateColumns='';
    grid.style.minWidth='';
  }

  grid.innerHTML='';

  const areaMap = {};
  list.forEach(x=>{
    const area = String(x.code || '').replace(/\d+/g,'') || '未分区';
    if(!areaMap[area]) areaMap[area] = [];
    areaMap[area].push(x);
  });
  const areaNames = Object.keys(areaMap).sort();

  const createCard = (x)=>{
    const c=document.createElement('div');
    c.className=`card ${x.ui}`;
    c.dataset.code = x.code;

    let content='';
    if(x.machines.length){
      const head=x.machines.slice(0,4).map(m=>`<div>${m.sn||'-'}</div>`).join('');
      content=`<div class="sn">${head}</div>`;
      if(x.machines.length>4) content+=`<div class="sn-more">+${x.machines.length-4} 台</div>`;
    }else{
      content=`<div class="empty">${txt[x.ui]}</div>`;
    }

    c.innerHTML=`<div class="code">${x.code}</div><div class="tag">${txt[x.ui]}</div><div class="count">${x.count} / ${x.max_capacity}</div>${content}`;
    c.onclick=(e)=>{e.stopPropagation();setVal(x.code);showToast(`${x.code} | ${txt[x.ui]} | ${x.count}/${x.max_capacity}`)};
    return c;
  };

  areaNames.forEach((areaName, idx)=>{
    const section = document.createElement('div');
    section.className = 'area-section';

    const divider = document.createElement('div');
    divider.className = 'area-divider';
    divider.textContent = `${areaName} 区`;
    section.appendChild(divider);

    const areaGrid = document.createElement('div');
    areaGrid.className = matrix ? 'grid matrix' : 'grid auto';

    const areaSlots = areaMap[areaName];
    const minRow = matrix ? Math.min(...areaSlots.map(s=>Number(s.row||1))) : 1;
    const minCol = matrix ? Math.min(...areaSlots.map(s=>Number(s.col||1))) : 1;

    if(matrix){
      const localCols = Math.max(...areaSlots.map(s=>Number(s.col||1))) - minCol + 1;
      areaGrid.style.gridTemplateColumns = `repeat(${Math.max(1, localCols)}, minmax(150px, 1fr))`;
      areaGrid.style.minWidth = `${Math.max(760, Math.max(1, localCols)*168)}px`;
    }

    areaSlots.forEach(x=> {
      const card = createCard(x);
      if(matrix){
        card.style.gridColumn = String(Number(x.col||1) - minCol + 1);
        card.style.gridRow = String(Number(x.row||1) - minRow + 1);
      }
      areaGrid.appendChild(card);
    });
    section.appendChild(areaGrid);

    const holder = document.createElement('div');
    holder.style.gridColumn = '1 / -1';
    holder.appendChild(section);
    grid.appendChild(holder);
  });

  setTimeout(()=>setH(calcFrameHeight()),0);
}

function bind(){
  document.querySelectorAll('.btn').forEach(btn=>{
    btn.onclick=()=>{
      document.querySelectorAll('.btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      filter=btn.dataset.filter||'all';
      render();
    };
  });

  document.getElementById('q').oninput=(e)=>{
    query=e.target.value||'';
    render();

    const exact = query.trim().toUpperCase();
    if(exact){
      const target = document.querySelector(`.card[data-code="${exact}"]`);
      if(target){
        target.classList.add('hit');
        target.scrollIntoView({behavior:'smooth',block:'center'});
        setTimeout(()=>target.classList.remove('hit'),1200);
      }
    }
  };

  const areaSel = document.getElementById('areaSel');
  if(areaSel){
    areaSel.onchange = (e)=>{
      areaFilter = e.target.value || 'all';
      render();
    };
  }
}

window.addEventListener('message',(event)=>{
  if(!event.data||event.data.type!=='streamlit:render') return;

  if(!inited){
    inited=true;
    sendMessageToStreamlit('streamlit:componentReady',{apiVersion:1});
  }

  const args=event.data.args||{};
  const raw=Array.isArray(args.slots)?args.slots:[];
  document.body.classList.toggle('high-contrast',!!args.fullscreen);

  allSlots=raw.map(s=>{
    const machines=Array.isArray(s.machines)?s.machines:[];
    const search=(String(s.code||'')+' '+machines.map(m=>m&&m.sn?String(m.sn):'').join(' ')).toLowerCase();
    const area = (String(s.code||'').match(/^[A-Za-z]+/)||['未分区'])[0].toUpperCase();
    return {
      ...s,
      code:String(s.code||'-'),
      count:Number(s.count||0),
      max_capacity:Number(s.max_capacity||0),
      x:Number(s.x),
      y:Number(s.y),
      machines,
      area,
      ui:normStatus(s),
      search
    };
  });

  populateAreaSelect();
  render();
});

window.addEventListener('resize',()=>setH(calcFrameHeight()));

bind();
sendMessageToStreamlit('streamlit:componentReady',{apiVersion:1});
setH(calcFrameHeight());
</script>
</body>
</html>
